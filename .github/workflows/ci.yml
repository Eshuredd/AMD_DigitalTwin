name: CropTwin CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests and SQLite migrations
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            frontend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -r frontend/requirements.txt

      - name: Validate installed dependencies
        run: python -m pip check

      - name: Compile application modules
        run: python -m compileall backend/app backend/alembic/versions frontend

      - name: Import application modules
        env:
          PYTHONPATH: backend:.
        run: |
          python - <<'PY'
          import app.main
          import frontend.api_client
          import frontend.ui_helpers
          print("Application imports succeeded.")
          PY

      - name: Run complete pytest suite
        env:
          PYTHONPATH: backend
        run: python -m pytest -v backend/tests

      - name: SQLite Alembic round trip
        env:
          PYTHONPATH: .
        run: |
          set -euo pipefail
          db_path="${RUNNER_TEMP}/croptwin-ci.sqlite"
          rm -f "$db_path"
          export CROPTWIN_DATABASE_URL="sqlite+pysqlite:///${db_path}"
          cd backend
          alembic upgrade head
          alembic current
          alembic downgrade base
          alembic upgrade head
          rm -f "$db_path"

  postgres-migrations:
    name: PostgreSQL migrations and persistence smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: croptwin_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d croptwin_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      CROPTWIN_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/croptwin_ci
      CROPTWIN_TEST_POSTGRES_URL: postgresql+psycopg://postgres:postgres@localhost:5432/croptwin_ci
      CROPTWIN_STATE_STORE: sqlalchemy
      CROPTWIN_AUTO_CREATE_DB: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Validate installed dependencies
        run: python -m pip check

      - name: Run PostgreSQL Alembic migrations
        env:
          PYTHONPATH: .
        run: |
          set -euo pipefail
          cd backend
          alembic upgrade head
          alembic current | tee "${RUNNER_TEMP}/postgres-alembic-current.txt"
          grep "202607230005" "${RUNNER_TEMP}/postgres-alembic-current.txt"
          alembic downgrade base
          alembic upgrade head

      - name: Run PostgreSQL persistence smoke test
        env:
          PYTHONPATH: backend
        run: python -m pytest -v backend/tests/integration/test_postgres_persistence.py

  docker-smoke:
    name: Docker build and startup smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t croptwin-ci:${{ github.sha }} .

      - name: Start Docker container
        id: container
        run: |
          set -euo pipefail
          container_name="croptwin-ci-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "name=${container_name}" >> "$GITHUB_OUTPUT"
          docker run \
            --detach \
            --name "${container_name}" \
            --publish 7860:7860 \
            --env CROPTWIN_STATE_STORE=sqlalchemy \
            --env CROPTWIN_DATABASE_URL=sqlite+pysqlite:////workspace/data/croptwin-ci.db \
            --env CROPTWIN_AUTO_CREATE_DB=true \
            --env CROPTWIN_API_BASE_URL=http://127.0.0.1:8000 \
            croptwin-ci:${{ github.sha }}

      - name: Wait for Streamlit health
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:7860/_stcore/health; then
              echo "Streamlit health check passed on attempt ${attempt}."
              exit 0
            fi
            docker ps --filter "name=${{ steps.container.outputs.name }}"
            sleep 5
          done
          echo "Streamlit health endpoint did not become ready."
          docker logs "${{ steps.container.outputs.name }}"
          exit 1

      - name: Check backend health inside container
        run: |
          docker exec "${{ steps.container.outputs.name }}" python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=10) as response:
              payload = json.load(response)
          assert payload["status"] == "ok", payload
          assert payload["service"] == "crop-twin-api", payload
          print(payload)
          PY

      - name: Show Docker logs on failure
        if: failure()
        run: docker logs "${{ steps.container.outputs.name }}"

      - name: Remove Docker container
        if: always()
        run: |
          docker rm -f "${{ steps.container.outputs.name }}" >/dev/null 2>&1 || true
