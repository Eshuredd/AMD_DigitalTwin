services:
  croptwin:
    environment:
      CROPTWIN_STATE_STORE: sqlalchemy
      CROPTWIN_DATABASE_URL: postgresql+psycopg://croptwin:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before starting PostgreSQL mode}@postgres:5432/croptwin
      CROPTWIN_AUTO_CREATE_DB: "false"
    volumes: !reset []
    depends_on:
      migrate:
        condition: service_completed_successfully

  migrate:
    build: .
    command: /bin/sh -c "cd /workspace/backend && alembic upgrade head"
    environment:
      CROPTWIN_STATE_STORE: sqlalchemy
      CROPTWIN_DATABASE_URL: postgresql+psycopg://croptwin:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before starting PostgreSQL mode}@postgres:5432/croptwin
      CROPTWIN_AUTO_CREATE_DB: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: croptwin
      POSTGRES_USER: croptwin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before starting PostgreSQL mode}
    volumes:
      - croptwin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U croptwin -d croptwin"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  croptwin_sqlite_data: !reset null
  croptwin_postgres_data:
